<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" rx="32" fill="#060608"/>
  
  <!-- Grid lines subtle -->
  <line x1="0" y1="66" x2="200" y2="66" stroke="#00ff8808" stroke-width="1"/>
  <line x1="0" y1="133" x2="200" y2="133" stroke="#00ff8808" stroke-width="1"/>
  <line x1="66" y1="0" x2="66" y2="200" stroke="#00ff8808" stroke-width="1"/>
  <line x1="133" y1="0" x2="133" y2="200" stroke="#00ff8808" stroke-width="1"/>
  
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="80" stroke="#00ff88" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.3"/>
  
  <!-- Inner glow circle -->
  <circle cx="100" cy="100" r="60" fill="#00ff8808"/>
  <circle cx="100" cy="100" r="60" stroke="#00ff88" stroke-width="1" opacity="0.2"/>
  
  <!-- Eye / Target center -->
  <circle cx="100" cy="100" r="20" fill="#00ff8820" stroke="#00ff88" stroke-width="2"/>
  <circle cx="100" cy="100" r="8" fill="#00ff88"/>
  
  <!-- Cross hairs -->
  <line x1="100" y1="40" x2="100" y2="76" stroke="#00ff88" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="100" y1="124" x2="100" y2="160" stroke="#00ff88" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="40" y1="100" x2="76" y2="100" stroke="#00ff88" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="124" y1="100" x2="160" y2="100" stroke="#00ff88" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Corner brackets -->
  <path d="M 44 60 L 44 44 L 60 44" stroke="#00ff88" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M 140 44 L 156 44 L 156 60" stroke="#00ff88" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M 156 140 L 156 156 L 140 156" stroke="#00ff88" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M 60 156 L 44 156 L 44 140" stroke="#00ff88" stroke-width="2" stroke-linecap="round" fill="none"/>
  
  <!-- Pulse ring -->
  <circle cx="100" cy="100" r="40" stroke="#00ff88" stroke-width="1" opacity="0.4"/>
</svg>
