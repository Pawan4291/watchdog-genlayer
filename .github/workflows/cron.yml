name: WATCHDOG Cron

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  run-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger watchdog checks
        run: |
          curl -X GET "${{ secrets.VERCEL_APP_URL }}/api/cron/run-checks" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          --max-time 30

  send-alerts:
    runs-on: ubuntu-latest
    needs: run-checks
    steps:
      - name: Wait for AI validators
        run: sleep 300
      - name: Send Discord alerts
        run: |
          curl -X GET "${{ secrets.VERCEL_APP_URL }}/api/cron/send-alerts" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          --max-time 30